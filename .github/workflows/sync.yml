name: sync-clases

# Espejo del repo `clases` para servir la app en app.perrosdelaisla.es/clases/
# SIN tocar el repo `clases` ni usar tokens cross-repo: `clases` es público,
# así que basta el GITHUB_TOKEN de este repo para leerlo y para pushear aquí.
#
# NOTA de diseño (decidido): la sincronización va con retraso de hasta 15 min
# respecto a los push de `clases`. El disparo manual (workflow_dispatch)
# permite forzar un sync inmediato cuando haga falta.

on:
  schedule:
    - cron: '*/15 * * * *'   # cada 15 minutos
  workflow_dispatch:          # botón "Run workflow" para sync inmediato

permissions:
  contents: write

concurrency:
  group: sync-clases
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout de este repo (app)
        uses: actions/checkout@v4

      - name: Checkout del repo fuente (clases, público, main)
        uses: actions/checkout@v4
        with:
          repository: perrosdelaisla/clases
          ref: main
          path: _src_clases
          fetch-depth: 1

      - name: Capturar SHA corto de clases
        id: src
        run: echo "sha=$(git -C _src_clases rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Sincronizar contenido a ./clases (con --delete)
        run: |
          mkdir -p clases
          # Copia el árbol de clases dentro de ./clases/ borrando lo que ya
          # no exista en origen. Se excluyen .git y .github del origen.
          # Como el destino es ./clases/, los ficheros raíz de este repo
          # (CNAME, index.html, .nojekyll, .github/) NO se tocan nunca.
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            _src_clases/ clases/

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A clases
          if git diff --cached --quiet; then
            echo "Sin cambios: clases ya está sincronizado."
          else
            git commit -m "sync: clases@${{ steps.src.outputs.sha }}"
            git push
          fi
